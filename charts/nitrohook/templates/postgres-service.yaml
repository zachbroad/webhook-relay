apiVersion: v1
kind: Service
metadata:
  name: {{ include "nitrohook.fullname" . }}-postgres
  labels:
    {{- include "nitrohook.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  selector:
    {{- include "nitrohook.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
